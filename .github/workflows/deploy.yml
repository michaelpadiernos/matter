name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up mise and Node.js
        run: |
          if ! command -v mise &> /dev/null && ! [ -f "$HOME/.local/bin/mise" ]; then
            curl https://mise.run | sh
          fi
          export PATH="$HOME/.local/bin:$PATH"
          mise use --global node@latest
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.local/share/mise/shims" >> $GITHUB_PATH

      - name: Install dependencies
        run: npm install

      - name: Build assets
        run: npx gulp build

      - name: Clone Font Awesome
        run: |
          rm -rf assets/images/Font-Awesome
          git clone --depth 1 https://github.com/FortAwesome/Font-Awesome.git assets/images/Font-Awesome

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.git/' --exclude='.github/' --exclude='.vscode/' --exclude='node_modules/' --exclude='package-lock.json'
          path: ./
          remote_path: ${{ secrets.DEPLOY_PATH }}
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Clear Drupal cache
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.DRUPAL_ROOT }}
            vendor/bin/drush cr
