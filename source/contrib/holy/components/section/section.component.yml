'$schema': 'https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json'
name: Section
group: Layout
status: stable
description: A section for nested components
props:
  type: object
  properties:
    section_header:
      type: boolean
      title: Show header region
      examples:
        - true
      default:
        - true
    section_footer:
      type: boolean
      title: Show footer region
      examples:
        - true
      default:
        - true
    columns:
      type: string
      title: Content layout
      enum:
        - '100'
        - '50-50'
        - '33-33-33'
        - '75-25'
        - '25-75'
        - '67-33'
        - '33-67'
        - '50-25-25'
        - '25-25-50'
        - '25-25-25-25'
      examples:
        - '50-50'
      default:
        - '50-50'
        
slots:
  header_slot:
    title: 'Header'
  main_slot:
    title: 'Grid'
  footer_slot:
    title: 'Footer'
