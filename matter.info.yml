name: Matter
type: theme
description: "Modern component-based Drupal theme with atomic design structure and PostCSS workflow"
core_version_requirement: ^11
base theme: false

libraries:
  - matter/global-styling

dependencies:
  - body_roles_classes:body_roles_classes
  - components:components
  - ui_icons:ui_icons
  - ui_patterns:ui_patterns
  - ui_skins:ui_skins
  - ui_styles:ui_styles

regions:
  branding                          : "Branding"
  navigation                        : "Navigation"
  focus                             : "Focus"
  hero                              : "Hero"
  highlight                         : "Highlight"
  content                           : "Content"
  sidebar                           : "Sidebar"
  footer                            : "Footer"
  buffer                            : "Buffer"

components:
  namespaces:
    nucleus                         : source/00-nucleus
    atoms                           : source/01-atoms
    molecules                       : source/02-molecules
    organisms                       : source/03-organisms
    symbiosis                       : source/04-symbiosis
    synergy                         : source/05-synergy
